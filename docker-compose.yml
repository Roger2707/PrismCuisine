services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-5085}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "${SQL_CONNECTION_STRING:-Server=host.docker.internal,1433;Database=PrismERP;User Id=sa;Password=admin1;TrustServerCertificate=True;}"
      ConnectionStrings__Redis: "redis:6379"
    depends_on:
      redis:
        condition: service_started

  web:
    build:
      context: ./Frontend/prism-erp-web
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-5173}:80"
    depends_on:
      - api
